# ═══════════════════════════════════════════════════════════════════════════
# nas.conf — Configuración central del NAS S905X3
# Guía Maestra NAS V58
#
# ── INSTRUCCIONES ────────────────────────────────────────────────────────
# 1. Editar este archivo ANTES de ejecutar install.sh
# 2. Verificar que los discos existen con: lsblk
# 3. Cambiar DB_PASSWORD por una contraseña real (solo A-Za-z0-9)
# 4. Ajustar TIMEZONE si no estás en Ciudad de México
#
# ── HARDWARE OBJETIVO ────────────────────────────────────────────────────
#   TV Box:    Amlogic S905X3, 4 cores Cortex-A55, 4 GB RAM
#   eMMC:      128 GB interna (bus dedicado al SoC, no USB)
#   HDD USB3:  7200 RPM (fotos originales únicamente)
#   HDD USB2:  Cualquier capacidad (backup)
# ═══════════════════════════════════════════════════════════════════════════

# ── DISCOS ───────────────────────────────────────────────────────────────
# Verificar nombres con: lsblk
# Los nombres pueden variar según el orden en que el kernel los detecta.
# Normalmente: primer USB = sda, segundo USB = sdb
DISK_PHOTOS="/dev/sda"    # HDD 7200 RPM USB 3.0 — solo fotos originales
DISK_BACKUP="/dev/sdb"    # HDD USB 2.0 — backup rsync + backup DB

# No hay DISK_SSD — la eMMC interna se accede directamente en /var/lib/immich
# La eMMC tiene bus dedicado al SoC: no comparte USB con los HDDs.
# Esto elimina la contención de bus que limitaba el backup a ~60 MB/s.

# ── RUTAS DE MONTAJE ─────────────────────────────────────────────────────
MOUNT_PHOTOS="/mnt/storage-main"    # HDD fotos
MOUNT_BACKUP="/mnt/storage-backup"  # HDD backup
MOUNT_MERGED="/mnt/merged"          # mergerfs (HDD/photos + eMMC/cache)

# ── RUTA eMMC ────────────────────────────────────────────────────────────
# Todos los datos de alto IOPS van aquí:
# DB, modelos ML, thumbnails, videos encoded, nginx cache, perfiles
EMMC_IMMICH="/var/lib/immich"

# ── CREDENCIALES IMMICH ──────────────────────────────────────────────────
# IMPORTANTE: Cambiar antes de instalar.
# Restricción de Docker: solo caracteres A-Za-z0-9, sin símbolos especiales.
# Una contraseña débil es un riesgo si Tailscale queda expuesto.
DB_PASSWORD="jazz1988"

# ── ZONA HORARIA ─────────────────────────────────────────────────────────
# Afecta las fechas en los metadatos de fotos y los logs del sistema.
# Lista completa: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
TIMEZONE="America/Mexico_City"

# ── TELEGRAM (opcional) ──────────────────────────────────────────────────
# Si se deja vacío, las alertas de Telegram se deshabilitan silenciosamente.
# Para activar:
#   1. Crear bot con @BotFather en Telegram → obtener TELEGRAM_TOKEN
#   2. Enviar un mensaje al bot → obtener TELEGRAM_CHAT_ID con:
#      curl "https://api.telegram.org/bot<TOKEN>/getUpdates"
# Las alertas cubren: errores nocturnos, temperatura crítica, SMART warnings,
# falla de ventilador, backup DB, cache de video lleno.
TELEGRAM_TOKEN="7959933820:AAHFsPRji6Wocyvikh81qUButmCL5Fys0oQ"
TELEGRAM_CHAT_ID="976424113"

# ── CREDENCIALES PARA AUDITORÍA PLAYBACK (opcional) ─────────────────────
# Para que la auditoría HTTP + autocorrección nocturna funcione en automático,
# definir una de estas opciones:
#
# Opción recomendada (más segura y revocable):
# IMMICH_API_KEY="..."
#
# Opción alternativa:
# IMMICH_ADMIN_EMAIL="..."
# IMMICH_ADMIN_PASSWORD="..."
IMMICH_API_KEY=""
IMMICH_ADMIN_EMAIL=""
IMMICH_ADMIN_PASSWORD=""

# ── UMBRALES CACHE DE VIDEO ──────────────────────────────────────────────
# El cache vive en eMMC (/var/lib/immich/cache).
# eMMC de 128 GB con ~32 GB usados → ~96 GB libres.
# WARN_GB: aviso suave cuando el cache supera este tamaño
# CRIT_GB: aviso crítico — considerar limpiar manualmente
# cache-clean.sh solo audita huérfanos (NO borra cache).
# Si falta espacio, se puede migrar cache al HDD con
# /usr/local/bin/cache-migrate-to-disk.sh.
CACHE_WARN_GB=20
CACHE_CRIT_GB=40

# ── PLAYBACK / COMPRESIÓN DE VIDEO ───────────────────────────────────────
# Regla base para reproducción remota:
# si un video no supera este peso por minuto, se puede reproducir directo
# desde el portal o la app sin esperar a la compresión nocturna.
# 40 MB/min equivale aprox. a 5.33 Mbps promedio, razonable para una
# conexión mínima de 6 Mbps dejando un pequeño margen.
# Ejemplos:
#   30 s  -> hasta 20 MB
#   60 s  -> hasta 40 MB
#   120 s -> hasta 80 MB
# Si supera ese promedio, se mostrará el placeholder y se generará una
# versión ligera por la noche.
VIDEO_STREAM_MAX_MB_PER_MIN=40

# Meta real de salida para videos pesados.
# Se deja un poco por debajo del máximo para que la reproducción remota
# siga siendo estable incluso con picos normales de red de datos.
VIDEO_STREAM_TARGET_MB_PER_MIN=38

# Si un video solo rebasa un poco el máximo, se reencoda suave:
# misma resolución y solo ajuste de bitrate.
# Si rebasa más de este valor, entonces sí se permite reducción de tamaño
# de imagen durante la rutina nocturna.
VIDEO_STREAM_LIGHT_REENCODE_MAX_MB_PER_MIN=55

# Compatibilidad móvil/tablet para salidas de conversión:
# - se fuerza lado largo máximo para evitar 4K vertical/horizontal en caché.
# - se fija nivel H.264 para mejorar reproducción en clientes modestos.
VIDEO_OPTIMIZE_MAX_LONG_EDGE=1920
VIDEO_OPTIMIZE_VIDEO_LEVEL=4.1

# ── CACHE_VIDEOS (canónico) ─────────────────────────────────────────────
# Política actual:
# - cache oficial/canónico en eMMC: /var/lib/immich/cache
# - espejo operativo de respaldo: /mnt/storage-backup/failover-main/cache
# - sin fallback legacy en runtime
CACHE_VIDEOS_CANONICAL_ONLY=1

# ── BACKUP DE FOTOS/VIDEOS ───────────────────────────────────────────────
# Modo recomendado: restic (deduplicado, crecimiento más estable).
# Opciones:
# - restic         -> respaldo deduplicado de /photos (recomendado)
# - rsync_snapshot -> snapshots por fecha con hard-links (legado)
BACKUP_PHOTOS_MODE="restic"

# Restic (fotos/videos):
BACKUP_RESTIC_REPO="/mnt/storage-backup/restic/photos"
BACKUP_RESTIC_PASSWORD_FILE="/etc/nas-restic-password"
BACKUP_RESTIC_KEEP_DAILY=7
BACKUP_RESTIC_KEEP_WEEKLY=4
BACKUP_RESTIC_KEEP_MONTHLY=3

# Solo aplica si BACKUP_PHOTOS_MODE=rsync_snapshot.
BACKUP_RETENTION_DAYS=7

# ── FAILOVER AUTOMÁTICO (falla grave disco principal) ────────────────────
# Switch a respaldo SOLO si el principal no puede continuar:
# - desmontado / source inválido
# - I/O básico fallando en /mnt/storage-main/photos
# No hace switch por alertas leves.
AUTO_FAILOVER_ENABLED=1
AUTO_FAILBACK_ENABLED=1
FAILOVER_IO_CHECK_ENABLED=1
FAILOVER_IO_TIMEOUT_SEC=8
FAILOVER_SYNC_ENABLED=1
FAILOVER_SYNC_PHOTOS_ENABLED=1
FAILOVER_SYNC_CACHE_ENABLED=1

# ── FORMATEO DE DISCOS ────────────────────────────────────────────────────
# ALLOW_FORMAT=yes  → aborta si el disco ya tiene particiones (seguro, default)
# ALLOW_FORMAT=yes → borra todo con wipefs y reformatea (destructivo)
# Cambiar a "yes" solo si los discos ya tienen datos que quieres eliminar.
ALLOW_FORMAT=yes
